<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Book - Library Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/addbook.css">
</head>
<body class="addbook-page">
    <div class="addbook-container">
        <div class="addbook-header">
            <i class="fas fa-book-medical"></i>
            <h1>Add New Book</h1>
            <p>Enter book details to add to the library collection</p>
        </div>

        <form action="add" method="post" class="addbook-form">
            <label for="title"><i class="fas fa-book"></i> Book Title</label>
            <input type="text" id="title" name="title" placeholder="e.g. The Great Gatsby" required>

            <label for="auth"><i class="fas fa-user-pen"></i> Author Name</label>
            <input type="text" id="auth" name="auth" placeholder="e.g. F. Scott Fitzgerald" required>

            <label for="cate"><i class="fas fa-folder"></i> Category</label>
            <input type="text" id="cate" name="cate" placeholder="e.g. Fiction, Science, History" required>

            <label for="qunt"><i class="fas fa-layer-group"></i> Quantity</label>
            <input type="number" id="qunt" name="qunt" placeholder="e.g. 5" min="1" required>

            <input type="submit" value="  Add Book">
            <a href="index.html" class="addbook-cancel">  Cancel</a>
        </form>
    </div>
</body>
</html>
