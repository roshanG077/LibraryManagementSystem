<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Book - Library Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-book-reader"></i> <span>LibSys</span></h2>
        </div>
        
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="fas fa-home"></i> <span>Dashboard</span></a></li>
            <li><a href="addform.html" class="active"><i class="fas fa-book"></i> <span>Books</span></a></li>
            <li><a href="addmember.html"><i class="fas fa-users"></i> <span>Members</span></a></li>
            <li><a href="issuebook.html"><i class="fas fa-exchange-alt"></i> <span>Issue Books</span></a></li>
            <li><a href="viewmember"><i class="fas fa-list"></i> <span>View Members</span></a></li>
            <li><a href="IssuedBook"><i class="fas fa-clock"></i> <span>Issued Books</span></a></li>
            <li><a href="ReturnBookServlet"><i class="fas fa-undo"></i> <span>Return Book</span></a></li>
            <li><a href="#"><i class="fas fa-chart-line"></i> <span>Reports</span></a></li>
        </ul>

        <div class="sidebar-footer">
            <a href="login.html" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        
        <!-- TOP HEADER -->
        <header class="top-header">
            <div class="welcome">
                <h1>Edit Book</h1>
                <p>Update book details in the library database</p>
            </div>
            <div class="user-profile">
                <button id="theme-toggle" class="theme-toggle">
                    <i class="fas fa-moon"></i> Dark Mode
                </button>
                <div class="user-avatar">L</div>
                <span>Admin</span>
            </div>
        </header>

        <!-- BOOK UPDATE FORM -->
        <div class="update-page">
            <div class="update-container">
                <div class="update-header">
                    <i class="fas fa-edit" style="font-size: 50px; color: var(--primary-color); margin-bottom: 15px;"></i>
                    <h1>Edit Book</h1>
                    <p>Update the book information below</p>
                </div>
                
                <form action="update" method="post">
                    <div class="form-group">
                        <label for="id"><i class="fas fa-id-card"></i> Book ID</label>
                        <input type="text" id="id" name="id" placeholder="Enter Book ID" required>
                    </div>

                    <div class="form-group">
                        <label for="title"><i class="fas fa-book"></i> Book Title</label>
                        <input type="text" id="title" name="title" placeholder="Enter Book Title" required>
                    </div>

                    <div class="form-group">
                        <label for="auth"><i class="fas fa-user"></i> Author Name</label>
                        <input type="text" id="auth" name="auth" placeholder="Enter Author Name" required>
                    </div>

                    <div class="form-group">
                        <label for="cate"><i class="fas fa-folder"></i> Category</label>
                        <input type="text" id="cate" name="cate" placeholder="Enter Book Category" required>
                    </div>

                    <div class="form-group">
                        <label for="qunt"><i class="fas fa-boxes"></i> Quantity</label>
                        <input type="number" id="qunt" name="qunt" placeholder="Enter Quantity" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-submit">
                            <i class="fas fa-save"></i> Update Book
                        </button>
                        <a href="index.html" class="btn-cancel">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <!-- THEME TOGGLE SCRIPT -->
    <script src="script.js"></script>
</body>
</html>
