<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian Login - Library Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-icon">
                <i class="fas fa-book-reader"></i>
            </div>
            <h2>Library Admin</h2>
            <p>Sign in to manage your library</p>

            <!-- NOTE: In production, hook this form to a LoginServlet that validates credentials -->
            <form action="index.html" method="get">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" name="email" placeholder="admin@library.com" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <p style="margin-top: 18px; font-size: 12px; color: #64748b; text-align: center;">
                &copy; 2024 Library Management System
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
